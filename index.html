<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Index</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f3ed;
      --ink: #1a1714;
      --warm-mid: #b5a898;
      --accent: #c45c3a;
      --card-bg: #ffffff;
      --border: #e2dbd3;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 20px auto 0;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 32px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      animation: fadeUp 0.6s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(26,23,20,0.10);
      border-color: var(--accent);
    }

    .card:hover .arrow {
      transform: translateX(5px);
      color: var(--accent);
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .badge {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--cream);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .card-text .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-mid);
      margin-bottom: 4px;
    }

    .card-text .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--ink);
    }

    .arrow {
      font-size: 1.3rem;
      color: var(--warm-mid);
      transition: transform 0.25s ease, color 0.25s ease;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: var(--warm-mid);
      letter-spacing: 0.05em;
      animation: fadeUp 0.6s 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <p class="eyebrow">Page Directory</p>
      <h1>Banner <em>Index</em></h1>
      <div class="divider"></div>
    </header>

    <nav class="cards">
      <a href="topbanner1.html" class="card">
        <div class="card-left">
          <div class="badge">01</div>
          <div class="card-text">
            <p class="label">Banner Page</p>
            <p class="title">Top Banner One</p>
          </div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="topbanner2.html" class="card">
        <div class="card-left">
          <div class="badge">02</div>
          <div class="card-text">
            <p class="label">Banner Page</p>
            <p class="title">Top Banner Two</p>
          </div>
        </div>
        <span class="arrow">→</span>
      </a>
    </nav>

    <footer>Place all three files in the same folder to use the links.</footer>
  </div>
</body>
</html>
